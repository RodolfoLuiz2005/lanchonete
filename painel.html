<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Admin</title>
    <link rel="stylesheet" href="painel.css">
</head>

<body>

    <div class="container">


        <main>

            <header>
                <div class="card">
                    <h3>Pedidos Hoje</h3>
                    <span id="pedidos-hoje">0</span>
                </div>

                <div class="card">
                    <h3>Entregas</h3>
                    <span id="entregas">0</span>
                </div>
            </header>

            <section class="kanban">

                <div class="column" id="recebidos">
                    <h2>Recebidos</h2>
                </div>

                <div class="column" id="preparando">
                    <h2>Preparando</h2>
                </div>

                <div class="column" id="entrega">
                    <h2>Entrega</h2>
                </div>

                <div class="column" id="finalizado">

                    <div class="column-header">
                        <h2>Finalizado</h2>

                        <button id="btn-limpar-finalizados">
                            Limpar
                        </button>
                    </div>

                </div>

            </section>

        </main>

    </div>

    

</body>

<script src="adm.js"></script>

</html>
